<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Don't Text — Tu ancla emocional</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090f;--surface:#12121e;--surface2:#1a1a2e;
      --accent:#a78bfa;--accent-dim:#6d4fc7;--accent-glow:rgba(167,139,250,0.15);
      --text:#e2e0f0;--text-dim:#7c7a96;
      --bubble-ai:#16153a;--bubble-user:#2d1f5e;
      --border:rgba(167,139,250,0.14);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
    .bg-orb{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(109,79,199,0.18) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;animation:orb 6s ease-in-out infinite;}
    @keyframes orb{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}}
    .bg-stars{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
    .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);opacity:0;}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op,.5)}}
    .screen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;}
    .screen.active{display:flex;}
    #s-intro{align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .badge{display:inline-block;font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);border:1px solid var(--border);padding:4px 14px;border-radius:99px;margin-bottom:1.5rem;background:var(--accent-glow);}
    .title{font-family:'Playfair Display',serif;font-size:clamp(3rem,12vw,5.5rem);font-weight:400;line-height:1.05;margin-bottom:.5rem;}
    .title em{font-style:italic;color:var(--accent);}
    .subtitle{font-size:1rem;color:var(--text-dim);font-weight:300;max-width:320px;line-height:1.7;margin-bottom:2.5rem;}
    .btn-main{display:inline-flex;align-items:center;gap:.75rem;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:none;padding:1.1rem 2.5rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;box-shadow:0 0 40px rgba(124,58,237,.4);}
    .intro-note{position:absolute;bottom:2rem;font-size:.72rem;color:var(--text-dim);}
    #s-ob{align-items:center;justify-content:center;padding:2rem;}
    .ob-wrap{width:100%;max-width:460px;}
    .ob-progress{display:flex;gap:6px;margin-bottom:2rem;}
    .ob-dot{flex:1;height:3px;border-radius:99px;background:var(--border);transition:background .3s;}
    .ob-dot.done{background:var(--accent);}
    .ob-label{font-size:.7rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}
    .ob-q{font-family:'Playfair Display',serif;font-size:1.6rem;line-height:1.3;margin-bottom:.5rem;}
    .ob-sub{font-size:.85rem;color:var(--text-dim);line-height:1.65;margin-bottom:1.5rem;}
    .ob-options{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
    .ob-opt{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);cursor:pointer;text-align:left;transition:border-color .15s,background .15s;}
    .ob-opt:hover,.ob-opt.sel{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.08);}
    .ob-text-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:1rem;}
    .ob-text-input:focus{border-color:rgba(167,139,250,.4);}
    .ob-text-input::placeholder{color:var(--text-dim);}
    .btn-next{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:none;padding:11px 28px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;}
    .btn-next:disabled{opacity:.35;cursor:not-allowed;}
    #s-chat{overflow:hidden;}
    .chat-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(9,9,15,.9);backdrop-filter:blur(20px);flex-shrink:0;}
    .ch-left{display:flex;align-items:center;gap:10px;}
    .ch-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4c1d95,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:.85rem;}
    .ch-name{font-family:'Playfair Display',serif;font-size:1rem;}
    .ch-status{font-size:.7rem;color:var(--accent);display:flex;align-items:center;gap:5px;}
    .ch-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .btn-back{background:none;border:1px solid var(--border);color:var(--text-dim);padding:5px 14px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;}
    .chat-msgs{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:12px;}
    .chat-msgs::-webkit-scrollbar{width:3px;}
    .chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    .msg{display:flex;gap:8px;max-width:86%;animation:msgIn .35s ease both;}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg.ai{align-self:flex-start;}
    .msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;margin-top:2px;}
    .msg.ai .msg-av{background:linear-gradient(135deg,#4c1d95,#7c3aed);}
    .msg.user .msg-av{background:var(--surface2);border:1px solid var(--border);}
    .msg-bubble{padding:10px 14px;border-radius:16px;font-size:.875rem;line-height:1.65;white-space:pre-wrap;font-weight:300;}
    .msg.ai .msg-bubble{background:var(--bubble-ai);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .msg.user .msg-bubble{background:var(--bubble-user);border:1px solid rgba(167,139,250,.2);border-bottom-right-radius:4px;}
    .typing{display:flex;gap:8px;align-self:flex-start;}
    .t-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#4c1d95,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;margin-top:2px;}
    .t-dots{background:var(--bubble-ai);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;padding:12px 14px;display:flex;gap:5px;align-items:center;}
    .t-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent-dim);animation:bounce 1.2s ease-in-out infinite;}
    .t-dots span:nth-child(2){animation-delay:.2s}.t-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
    .chat-bottom{padding:.75rem 1.25rem 1.25rem;border-top:1px solid var(--border);background:rgba(9,9,15,.9);backdrop-filter:blur(20px);flex-shrink:0;}
    .input-row{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.5rem .5rem .5rem 1rem;}
    .input-row:focus-within{border-color:rgba(167,139,250,.35);}
    #chat-in{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:300;line-height:1.5;padding:.2rem 0;}
    #chat-in::placeholder{color:var(--text-dim);}
    .btn-send{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .btn-send:disabled{opacity:.4;cursor:not-allowed;}
    .btn-send svg{width:14px;height:14px;fill:#fff;}
    .hint{font-size:.68rem;color:var(--text-dim);text-align:center;margin-top:.5rem;}
  </style>
</head>
<body>
<div class="bg-orb"></div>
<div class="bg-stars" id="stars"></div>

<div id="s-intro" class="screen active">
  <span class="badge">✦ tu ancla emocional</span>
  <h1 class="title">Don't<br><em>Text.</em></h1>
  <p class="subtitle">Estás a punto de escribirle. Respirá. Estoy acá para ayudarte a no hacerlo.</p>
  <button class="btn-main" id="btn-start">💬 Necesito ayuda ahora</button>
  <p class="intro-note">Sin registro · Confidencial · Siempre disponible</p>
</div>

<div id="s-ob" class="screen">
  <div class="ob-wrap">
    <div class="ob-progress">
      <div class="ob-dot" id="p0"></div>
      <div class="ob-dot" id="p1"></div>
      <div class="ob-dot" id="p2"></div>
    </div>
    <div id="ob-body"></div>
  </div>
</div>

<div id="s-chat" class="screen">
  <div class="chat-head">
    <div class="ch-left">
      <div class="ch-av">✦</div>
      <div>
        <div class="ch-name">Don't Text</div>
        <div class="ch-status"><span class="ch-dot"></span>acá para vos</div>
      </div>
    </div>
    <button class="btn-back" id="btn-back">← volver</button>
  </div>
  <div class="chat-msgs" id="msgs"></div>
  <div class="chat-bottom">
    <div class="input-row">
      <input type="text" id="chat-in" placeholder="Contame qué está pasando..." autocomplete="off" />
      <button class="btn-send" id="btn-send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="hint">Presioná Enter para enviar</p>
  </div>
</div>

<script>
// Stars
const starsEl=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*4+2}s;--delay:${Math.random()*5}s;--op:${Math.random()*.5+.2}`;starsEl.appendChild(s);}

let name='',time='',sit='',busy=false,msgCount=0,qIdx=0,answers={};
let usedGeneral=[];

const qs=[
  {id:'name',label:'Primero lo primero',q:'¿Cómo te llamás?',sub:'Solo tu nombre, para poder hablarte de cerca.',type:'input',ph:'Tu nombre...'},
  {id:'time',label:'Contame un poco',q:'¿Cuánto tiempo pasó desde la ruptura?',sub:'No hay respuesta correcta. Solo quiero entenderte mejor.',type:'opts',opts:['Menos de una semana','Unas semanas','Uno o dos meses','Más de dos meses']},
  {id:'sit',label:'Ahora mismo',q:'¿Qué está pasando en este momento?',sub:'Elegí lo que más se acerque a lo que sentís ahora.',type:'opts',opts:['Estoy a punto de escribirle','No puedo dejar de pensar en él/ella','Siento que no puedo más','Necesito hablar con alguien']}
];

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function renderQ(){
  const q=qs[qIdx];
  [0,1,2].forEach(i=>document.getElementById('p'+i).classList.toggle('done',i<=qIdx));
  const b=document.getElementById('ob-body');
  if(q.type==='input'){
    b.innerHTML=`<div class="ob-label">${q.label}</div><div class="ob-q">${q.q}</div><div class="ob-sub">${q.sub}</div><input class="ob-text-input" id="ob-in" type="text" placeholder="${q.ph}" maxlength="30"/><br><button class="btn-next" id="ob-next" disabled>Continuar →</button>`;
    const inp=document.getElementById('ob-in');
    const btn=document.getElementById('ob-next');
    inp.addEventListener('input',()=>{btn.disabled=inp.value.trim().length<2;});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&inp.value.trim().length>=2)nextQ();});
    btn.addEventListener('click',nextQ);
    setTimeout(()=>inp.focus(),100);
  } else {
    b.innerHTML=`<div class="ob-label">${q.label}</div><div class="ob-q">${q.q}</div><div class="ob-sub">${q.sub}</div><div class="ob-options">${q.opts.map((o,i)=>`<button class="ob-opt" data-v="${o}">${o}</button>`).join('')}</div>`;
    b.querySelectorAll('.ob-opt').forEach(btn=>btn.addEventListener('click',function(){
      answers[q.id]=this.dataset.v;
      b.querySelectorAll('.ob-opt').forEach(x=>x.classList.remove('sel'));
      this.classList.add('sel');
      setTimeout(nextQ,280);
    }));
  }
}

function nextQ(){
  const q=qs[qIdx];
  if(q.type==='input'){const v=document.getElementById('ob-in').value.trim();if(v.length<2)return;answers[q.id]=v;}
  if(!answers[q.id])return;
  qIdx++;
  if(qIdx>=qs.length){name=answers.name;time=answers.time;sit=answers.sit;startChat();}
  else renderQ();
}

function startChat(){
  show('s-chat');
  document.getElementById('msgs').innerHTML='';
  msgCount=0;usedGeneral=[];
  const greets={
    'Menos de una semana':`Hola, ${name}. Es muy reciente todo esto.\n\nEl dolor está en su momento más crudo y tiene todo el sentido que estés así. No hay nada mal en vos.\n\nContame, ¿qué está pasando ahora mismo?`,
    'Unas semanas':`Hola, ${name}. Que sigas sintiéndote así no significa que algo salió mal.\n\nEl duelo no tiene calendario. Hay días peores que otros, y que estés acá hoy habla bien de vos.\n\n¿Qué está pasando en este momento?`,
    'Uno o dos meses':`Hola, ${name}. Ya pasó un tiempo, pero esto no se resuelve en línea recta.\n\nQue estés acá hoy no significa que retrocediste. Significa que seguís eligiendo cuidarte.\n\nContame qué está pasando.`,
    'Más de dos meses':`Hola, ${name}. Llevas un buen tiempo cargando con esto.\n\nY que todavía duela no es una señal de debilidad — es una señal de que lo que viviste fue real e importante.\n\n¿Qué está pasando hoy?`
  };
  const g=greets[time]||`Hola, ${name}. Estoy acá.\n\nContame qué está pasando.`;
  setTimeout(()=>addMsg('ai',g),500);
  setTimeout(()=>document.getElementById('chat-in').focus(),600);
}

function addMsg(role,text){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg '+role;
  const av=document.createElement('div');av.className='msg-av';av.textContent=role==='ai'?'✦':(name?name[0].toUpperCase():'?');
  const b=document.createElement('div');b.className='msg-bubble';b.textContent=text;
  d.appendChild(av);d.appendChild(b);msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');d.className='typing';d.id='typing';
  d.innerHTML='<div class="t-av">✦</div><div class="t-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const e=document.getElementById('typing');if(e)e.remove();}

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function pickUnused(arr,usedRef){
  const available=arr.filter((_,i)=>!usedRef.includes(i));
  if(available.length===0){usedRef.length=0;}
  const pool=arr.filter((_,i)=>!usedRef.includes(i));
  const idx=arr.indexOf(pick(pool));
  usedRef.push(idx);
  return arr[idx];
}

function getReply(t){
  const tl=t.toLowerCase();

  // Querer escribir / llamar / contactar
  if(/escribi|llam|mand[ao]|whatsapp|mensaje|contac|texto/i.test(tl)){
    return pick([
      `Ese impulso que sentís ahora no es amor. Es ansiedad.\n\nLo que extrañás no es solo a él/ella — es ese espacio único que construyeron juntos, ese territorio que existía entre los dos y que ya no está. Tu mente lo busca porque todavía duele.\n\nPero escribirle desde este lugar no te va a devolver ese espacio. Solo te va a dejar más expuesto después.\n\nAntes de hacerlo, probá esto: inhalá contando hasta 4... retené 7 segundos... exhalá muy despacio en 8. Dos veces. ¿Podés intentarlo?`,
      `Entiendo ese deseo. Es completamente humano querer recuperar algo que fue importante.\n\nPero hay algo clave: ese mensaje que querés mandar nace del dolor, no de la claridad. Y las decisiones que tomamos desde el dolor casi nunca nos llevan donde queremos ir.\n\nCada vez que resistís este impulso, le devolvés algo a vos mismo. Es fuerza, no silencio.\n\n¿Qué fue lo que detonó las ganas hoy?`,
      `Querer escribirle tiene sentido. Lo que no tiene sentido es hacerlo desde este estado.\n\nNo porque no tengas derecho — sino porque no te va a dar lo que necesitás. El dolor que sentís ahora busca alivio inmediato, pero ese alivio dura minutos. El costo emocional dura días.\n\nProbá la respiración 4-7-8: inhalá 4, retené 7, exhalá 8. Hacelo dos veces antes de decidir cualquier cosa.`
    ]);
  }

  // Agotamiento / no poder más
  if(/no puedo|no aguant|cansad|agotad|harto|hart[ao]|no doy más|no da más/i.test(tl)){
    return pick([
      `Decir "no puedo más" toma coraje. Que lo estés diciendo acá, en vez de mandarlo en un mensaje, importa.\n\nEso que sentís tiene nombre: es el peso de una pérdida que todavía no terminó de procesarse. Es agotador. Tiene todo el sentido.\n\nProbá algo ahora: nombrá en voz baja 5 cosas que ves a tu alrededor. Después 4 que podés tocar. Es un ancla. Bajemos la intensidad de este momento juntos.`,
      `Ese agotamiento es real. No es exageración.\n\nCuando el duelo se instala así, todo requiere más energía de la normal. Levantarse, no pensar, no revisar el teléfono. Es un trabajo enorme que nadie ve.\n\nAhora mismo no tenés que hacer nada grande. Solo respirar. Inhalá 4 segundos, retené 7, exhalá 8. Una vez. ¿Cómo estás?`
    ]);
  }

  // Extrañar
  if(/extrañ|echo de menos|recuerd|no puedo dejar de pensar|lo pienso|la pienso/i.test(tl)){
    return pick([
      `Extrañar es una de las formas más honestas de haber amado.\n\nLo que perdiste no fue solo una persona. Fue un mundo compartido, una forma de verte reflejado en alguien que te conocía. Ese vacío es proporcional a lo que fue real.\n\nEl duelo no es olvidar. Es aprender a vivir con la marca que dejó ese amor. Y eso lleva tiempo — más del que quisiéramos.\n\n¿Hay algo puntual que disparó esto hoy?`,
      `Tiene sentido que siga apareciendo. La mente no tiene un interruptor.\n\nLo que llamamos "pensar en alguien" después de una ruptura muchas veces no es extrañar a la persona real — es extrañar cómo te sentías cuando estabas con ella. Esa diferencia importa.\n\nProbá la respiración 4-7-8 para bajar un poco la intensidad: inhalá 4, retené 7, exhalá 8. ¿Qué está pasando concretamente?`
    ]);
  }

  // Enojo / rabia
  if(/enoj|bronc|rabia|odio|furioso|me hiz|me trató|me falt|me minti/i.test(tl)){
    return pick([
      `La rabia también es parte del duelo. Y tiene todo el sentido.\n\nA veces el enojo es más fácil de sostener que la tristeza — porque en la tristeza estás vulnerable, y en la rabia sentís que tenés algo de control. Los dos son válidos.\n\nPero mandarle algo desde este estado casi siempre termina mal — no porque no tengas razón, sino porque no te va a dar el cierre que necesitás.\n\n¿Qué fue lo que pasó?`,
      `Esa bronca que sentís es información, no un problema.\n\nTe dice que algo fue injusto, que algo dolió, que algo no estuvo bien. Todo eso puede ser verdad.\n\nLo que no conviene es actuar desde ahí ahora mismo. Las palabras que mandamos desde la rabia no suelen decir lo que realmente queremos decir. ¿Querés contarme qué pasó?`
    ]);
  }

  // Esperanza de volver
  if(/volver|quiere|quizás|tal vez|se arrepient|me llam|capaz vuelve|puede que/i.test(tl)){
    return pick([
      `Esa esperanza es una de las partes más difíciles del duelo. Y es muy humana.\n\nLa mente construye escenarios, busca señales, reinterpreta mensajes. Es lo que hace cuando no quiere soltar algo que fue importante.\n\nPero tomar decisiones desde esa esperanza, en este momento de dolor, casi nunca lleva adonde queremos. ¿Qué te hace sentir que hay una posibilidad?`,
      `Querer que vuelva no significa que sea lo mejor para vos. Y saberlo no hace que el deseo desaparezca — eso es lo más difícil.\n\nAntes de hacer algo desde ese lugar, vale la pena preguntarse: ¿estás extrañando a la persona real, o a la versión de vos mismo que existía en esa relación?\n\nNo hay respuesta incorrecta. Solo quiero que lo pienses antes de actuar.`
    ]);
  }

  // Mejoría / agradecimiento
  if(/mejor|bien|calm|gracias|me ayud|sirvió|funcionó/i.test(tl)){
    return pick([
      `Me alegra escuchar eso.\n\nEse "mejor" vino de vos — de elegir no mandar ese mensaje, de respirar, de darte un minuto. No lo subestimes.\n\nGuardá esa sensación. La próxima vez que el impulso aparezca, ya sabés que pasa.`,
      `Bien. Eso importa.\n\nEl duelo no es una línea recta — va a haber momentos de calma y momentos difíciles. Los dos son parte del proceso. Cuando vuelva a aparecer ese impulso, ya sabés que podés manejarlo.\n\n¿Hay algo más que quieras contarme?`,
      `Eso es todo tuyo.\n\nNo fue magia ni distracción — elegiste pausar en el momento más difícil. Eso dice mucho de vos.`
    ]);
  }

  // Llanto / tristeza profunda
  if(/llor|triste|tristeza|deprim|oscur|vacío|siento nada/i.test(tl)){
    return pick([
      `La tristeza no es el enemigo. Es la señal de que algo importó.\n\nLo que duele no es debilidad — es la prueba de que amaste de verdad. Y eso vale.\n\nNo tenés que hacer nada con eso ahora mismo. Solo estar acá, respirar. Estoy con vos.`,
      `Ese vacío que describís es real. No es dramático ni exagerado.\n\nDespués de perder algo importante, hay un espacio que no sabe cómo llenarse todavía. Y la mente a veces interpreta ese espacio como un problema a resolver — por eso el impulso de escribirle.\n\nPero el vacío no se llena con un mensaje. Se va llenando de a poco, con tiempo y con otras cosas.\n\nProbá el ejercicio 5-4-3-2-1: 5 cosas que ves, 4 que tocás, 3 que escuchás, 2 que olés, 1 que saboreás. Anclate al presente por un momento.`
    ]);
  }

  // Respuestas generales — pool amplio y variado, sin nombre al inicio
  const generalPool = [
    `Lo que describís tiene todo el sentido dentro de un proceso de duelo.\n\nPerder una relación no es solo perder a una persona — es perder un mundo compartido, rutinas, proyectos, una forma de verse. Ese dolor es real y proporcional.\n\nProbá algo ahora: 5 cosas que ves, 4 que tocás, 3 que escuchás. Anclate al presente un momento. ¿Qué está pasando concretamente?`,
    `Escucho.\n\nA veces el dolor de una ruptura no viene en línea recta. Aparece de golpe, en momentos inesperados, y se siente como retroceder. Pero no es así.\n\nCada momento que elegís no actuar desde el dolor es un paso adelante, aunque no se sienta de esa manera.\n\n¿Querés contarme un poco más sobre lo que está pasando?`,
    `Tiene sentido que estés así.\n\nEl duelo tiene su propio ritmo y no le importa lo que nosotros queramos. Lo único que podés hacer es atravesarlo — no hay atajo.\n\nPero sí podés elegir cómo atravesarlo. Y estar acá, hablando, en vez de mandar ese mensaje, ya es una buena elección.\n\n¿Qué fue lo que detonó esto hoy?`,
    `Lo que sentís ahora es intenso, pero va a bajar.\n\nLos momentos de mayor ansiedad emocional duran entre 10 y 20 minutos si no los alimentamos. Cada mensaje que no mandamos, cada llamada que no hacemos, le da espacio al sistema nervioso para regularse.\n\nProbá la respiración 4-7-8: inhalá 4 segundos, retené 7, exhalá 8. Hacelo dos veces. ¿Cómo te sentís después?`,
    `No estás mal. Estás en proceso.\n\nHay una diferencia enorme entre estar roto y estar en duelo. Lo primero es permanente. Lo segundo no.\n\nContame qué está pasando ahora mismo. Sin filtros.`
  ];

  return pickUnused(generalPool, usedGeneral);
}

function send(){
  if(busy)return;
  const inp=document.getElementById('chat-in');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  addMsg('user',text);
  busy=true;
  document.getElementById('btn-send').disabled=true;
  showTyping();
  setTimeout(()=>{
    hideTyping();
    addMsg('ai',getReply(text));
    msgCount++;
    busy=false;
    document.getElementById('btn-send').disabled=false;
    inp.focus();
  },1400+Math.random()*800);
}

document.getElementById('btn-start').addEventListener('click',()=>{qIdx=0;answers={};show('s-ob');renderQ();});
document.getElementById('btn-back').addEventListener('click',()=>show('s-intro'));
document.getElementById('btn-send').addEventListener('click',send);
document.getElementById('chat-in').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();send();}});
</script>
