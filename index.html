<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Don't Text — Tu ancla emocional</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090f;--surface:#12121e;--surface2:#1a1a2e;
      --accent:#a78bfa;--accent-dim:#6d4fc7;--accent-glow:rgba(167,139,250,0.15);
      --text:#e2e0f0;--text-dim:#7c7a96;
      --bubble-ai:#16153a;--bubble-user:#2d1f5e;
      --border:rgba(167,139,250,0.14);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
    .bg-orb{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(109,79,199,0.18) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;animation:orb 6s ease-in-out infinite;}
    @keyframes orb{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}}
    .bg-stars{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
    .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);opacity:0;}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op,.5)}}

    /* SCREENS */
    .screen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;}
    .screen.active{display:flex;}

    /* INTRO */
    #s-intro{align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .badge{display:inline-block;font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);border:1px solid var(--border);padding:4px 14px;border-radius:99px;margin-bottom:1.5rem;background:var(--accent-glow);}
    .title{font-family:'Playfair Display',serif;font-size:clamp(3rem,12vw,5.5rem);font-weight:400;line-height:1.05;margin-bottom:.5rem;}
    .title em{font-style:italic;color:var(--accent);}
    .subtitle{font-size:1rem;color:var(--text-dim);font-weight:300;max-width:320px;line-height:1.7;margin-bottom:2.5rem;}
    .btn-main{display:inline-flex;align-items:center;gap:.75rem;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:none;padding:1.1rem 2.5rem;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;box-shadow:0 0 40px rgba(124,58,237,.4);}
    .intro-note{position:absolute;bottom:2rem;font-size:.72rem;color:var(--text-dim);}

    /* ONBOARDING */
    #s-ob{align-items:center;justify-content:center;padding:2rem;}
    .ob-wrap{width:100%;max-width:460px;}
    .ob-progress{display:flex;gap:6px;margin-bottom:2rem;}
    .ob-dot{flex:1;height:3px;border-radius:99px;background:var(--border);transition:background .3s;}
    .ob-dot.done{background:var(--accent);}
    .ob-label{font-size:.7rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}
    .ob-q{font-family:'Playfair Display',serif;font-size:1.6rem;line-height:1.3;margin-bottom:.5rem;}
    .ob-sub{font-size:.85rem;color:var(--text-dim);line-height:1.65;margin-bottom:1.5rem;}
    .ob-options{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
    .ob-opt{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);cursor:pointer;text-align:left;transition:border-color .15s,background .15s;}
    .ob-opt:hover,.ob-opt.sel{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.08);}
    .ob-text-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:1rem;}
    .ob-text-input:focus{border-color:rgba(167,139,250,.4);}
    .ob-text-input::placeholder{color:var(--text-dim);}
    .btn-next{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:none;padding:11px 28px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;}
    .btn-next:disabled{opacity:.35;cursor:not-allowed;}

    /* CHAT */
    #s-chat{overflow:hidden;}
    .chat-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(9,9,15,.9);backdrop-filter:blur(20px);flex-shrink:0;}
    .ch-left{display:flex;align-items:center;gap:10px;}
    .ch-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4c1d95,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:.85rem;}
    .ch-name{font-family:'Playfair Display',serif;font-size:1rem;}
    .ch-status{font-size:.7rem;color:var(--accent);display:flex;align-items:center;gap:5px;}
    .ch-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .btn-back{background:none;border:1px solid var(--border);color:var(--text-dim);padding:5px 14px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;}

    .chat-msgs{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:12px;}
    .chat-msgs::-webkit-scrollbar{width:3px;}
    .chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

    .msg{display:flex;gap:8px;max-width:86%;animation:msgIn .35s ease both;}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg.ai{align-self:flex-start;}
    .msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;margin-top:2px;}
    .msg.ai .msg-av{background:linear-gradient(135deg,#4c1d95,#7c3aed);}
    .msg.user .msg-av{background:var(--surface2);border:1px solid var(--border);}
    .msg-bubble{padding:10px 14px;border-radius:16px;font-size:.875rem;line-height:1.65;white-space:pre-wrap;font-weight:300;}
    .msg.ai .msg-bubble{background:var(--bubble-ai);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .msg.user .msg-bubble{background:var(--bubble-user);border:1px solid rgba(167,139,250,.2);border-bottom-right-radius:4px;}

    .typing{display:flex;gap:8px;align-self:flex-start;}
    .t-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#4c1d95,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;margin-top:2px;}
    .t-dots{background:var(--bubble-ai);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;padding:12px 14px;display:flex;gap:5px;align-items:center;}
    .t-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent-dim);animation:bounce 1.2s ease-in-out infinite;}
    .t-dots span:nth-child(2){animation-delay:.2s}.t-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

    .chat-bottom{padding:.75rem 1.25rem 1.25rem;border-top:1px solid var(--border);background:rgba(9,9,15,.9);backdrop-filter:blur(20px);flex-shrink:0;}
    .input-row{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.5rem .5rem .5rem 1rem;}
    .input-row:focus-within{border-color:rgba(167,139,250,.35);}
    #chat-in{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:300;line-height:1.5;padding:.2rem 0;}
    #chat-in::placeholder{color:var(--text-dim);}
    .btn-send{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .btn-send:disabled{opacity:.4;cursor:not-allowed;}
    .btn-send svg{width:14px;height:14px;fill:#fff;}
    .hint{font-size:.68rem;color:var(--text-dim);text-align:center;margin-top:.5rem;}
  </style>
</head>
<body>
<div class="bg-orb"></div>
<div class="bg-stars" id="stars"></div>

<!-- INTRO -->
<div id="s-intro" class="screen active">
  <span class="badge">✦ tu ancla emocional</span>
  <h1 class="title">Don't<br><em>Text.</em></h1>
  <p class="subtitle">Estás a punto de escribirle. Respirá. Estoy acá para ayudarte a no hacerlo.</p>
  <button class="btn-main" id="btn-start">💬 Necesito ayuda ahora</button>
  <p class="intro-note">Sin registro · Confidencial · Siempre disponible</p>
</div>

<!-- ONBOARDING -->
<div id="s-ob" class="screen">
  <div class="ob-wrap">
    <div class="ob-progress">
      <div class="ob-dot" id="p0"></div>
      <div class="ob-dot" id="p1"></div>
      <div class="ob-dot" id="p2"></div>
    </div>
    <div id="ob-body"></div>
  </div>
</div>

<!-- CHAT -->
<div id="s-chat" class="screen">
  <div class="chat-head">
    <div class="ch-left">
      <div class="ch-av">✦</div>
      <div>
        <div class="ch-name">Don't Text</div>
        <div class="ch-status"><span class="ch-dot"></span>acá para vos</div>
      </div>
    </div>
    <button class="btn-back" id="btn-back">← volver</button>
  </div>
  <div class="chat-msgs" id="msgs"></div>
  <div class="chat-bottom">
    <div class="input-row">
      <input type="text" id="chat-in" placeholder="Contame qué está pasando..." autocomplete="off" />
      <button class="btn-send" id="btn-send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="hint">Presioná Enter para enviar</p>
  </div>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*4+2}s;--delay:${Math.random()*5}s;--op:${Math.random()*.5+.2}`;starsEl.appendChild(s);}

// State
let name='', time='', sit='', busy=false, msgCount=0, qIdx=0, answers={};

const qs=[
  {id:'name',label:'Primero lo primero',q:'¿Cómo te llamás?',sub:'Solo tu nombre, para poder hablarte de cerca.',type:'input',ph:'Tu nombre...'},
  {id:'time',label:'Contame un poco',q:'¿Cuánto tiempo pasó desde la ruptura?',sub:'No hay respuesta correcta. Solo quiero entenderte mejor.',type:'opts',opts:['Menos de una semana','Unas semanas','Uno o dos meses','Más de dos meses']},
  {id:'sit',label:'Ahora mismo',q:'¿Qué está pasando en este momento?',sub:'Elegí lo que más se acerque a lo que sentís ahora.',type:'opts',opts:['Estoy a punto de escribirle','No puedo dejar de pensar en él/ella','Siento que no puedo más','Necesito hablar con alguien']}
];

// Screen nav
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// Onboarding
function renderQ(){
  const q=qs[qIdx];
  [0,1,2].forEach(i=>document.getElementById('p'+i).classList.toggle('done',i<=qIdx));
  const b=document.getElementById('ob-body');
  if(q.type==='input'){
    b.innerHTML=`<div class="ob-label">${q.label}</div><div class="ob-q">${q.q}</div><div class="ob-sub">${q.sub}</div><input class="ob-text-input" id="ob-in" type="text" placeholder="${q.ph}" maxlength="30"/><br><button class="btn-next" id="ob-next" disabled>Continuar →</button>`;
    const inp=document.getElementById('ob-in');
    const btn=document.getElementById('ob-next');
    inp.addEventListener('input',()=>{btn.disabled=inp.value.trim().length<2;});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&inp.value.trim().length>=2)nextQ();});
    btn.addEventListener('click',nextQ);
    setTimeout(()=>inp.focus(),100);
  } else {
    b.innerHTML=`<div class="ob-label">${q.label}</div><div class="ob-q">${q.q}</div><div class="ob-sub">${q.sub}</div><div class="ob-options">${q.opts.map((o,i)=>`<button class="ob-opt" data-i="${i}" data-v="${o}">${o}</button>`).join('')}</div>`;
    b.querySelectorAll('.ob-opt').forEach(btn=>btn.addEventListener('click',function(){
      answers[q.id]=this.dataset.v;
      b.querySelectorAll('.ob-opt').forEach(x=>x.classList.remove('sel'));
      this.classList.add('sel');
      setTimeout(nextQ,280);
    }));
  }
}

function nextQ(){
  const q=qs[qIdx];
  if(q.type==='input'){const v=document.getElementById('ob-in').value.trim();if(v.length<2)return;answers[q.id]=v;}
  if(!answers[q.id])return;
  qIdx++;
  if(qIdx>=qs.length){name=answers.name;time=answers.time;sit=answers.sit;startChat();}
  else renderQ();
}

// Chat
function startChat(){
  show('s-chat');
  document.getElementById('msgs').innerHTML='';
  msgCount=0;
  const greets={'Menos de una semana':`${name}, es muy reciente. El dolor está en su punto más crudo y tiene todo el sentido que estés así.`,'Unas semanas':`${name}, ya pasaron unas semanas. El duelo no tiene horarios, y que todavía duela no significa que algo salió mal.`,'Uno o dos meses':`${name}, ya pasó un tiempo, pero esto no se resuelve en línea recta. Que estés acá hoy no significa que retrocediste.`,'Más de dos meses':`${name}, llevas un buen tiempo cargando con esto. Y que todavía duela no significa que hiciste algo mal.`};
  const sits={'Estoy a punto de escribirle':'Que hayas entrado acá antes de hacerlo ya dice mucho de vos.','No puedo dejar de pensar en él/ella':'Esa presencia constante en tu cabeza tiene sentido. Es parte del proceso.','Siento que no puedo más':'Escucharte decir eso me importa. Estoy acá, no te apures.','Necesito hablar con alguien':'Bien que hayas venido. Contame lo que necesités.'};
  const g=greets[time]||`Hola, ${name}. Estoy acá.`;
  const s=sits[sit]||'Contame qué está pasando.';
  setTimeout(()=>addMsg('ai',`${g}\n\n${s}\n\n¿Qué está pasando ahora mismo?`),500);
  setTimeout(()=>document.getElementById('chat-in').focus(),600);
}

function addMsg(role,text){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg '+role;
  const av=document.createElement('div');av.className='msg-av';av.textContent=role==='ai'?'✦':(name?name[0].toUpperCase():'?');
  const b=document.createElement('div');b.className='msg-bubble';b.textContent=text;
  d.appendChild(av);d.appendChild(b);msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');d.className='typing';d.id='typing';
  d.innerHTML='<div class="t-av">✦</div><div class="t-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const e=document.getElementById('typing');if(e)e.remove();}

function getReply(t){
  const n=name;
  if(/escribi|llam|manda|whatsapp|mensaje/i.test(t))return[`${n}, ese impulso que sentís ahora no es amor. Es ansiedad.\n\nLo que extrañás no es solo a él/ella — es ese espacio único que construyeron juntos, ese territorio que existía entre los dos y que ya no está. Tu mente lo busca porque todavía duele.\n\nPero escribirle desde este lugar no va a devolverte ese espacio. Solo te va a dejar más expuesto.\n\nProbá esto: inhalá contando hasta 4... retené el aire 7 segundos... y exhalá muy despacio contando hasta 8. Dos veces. El impulso baja. ¿Podés intentarlo?`,`${n}, entiendo. Ese deseo de contacto es completamente humano.\n\nSolo duele lo que realmente importó. Lo que sentís es la prueba de que ese amor fue real. No lo minimices.\n\nPero enviar ese mensaje ahora no te va a dar lo que necesitás. Probablemente te deje más vulnerable después.\n\nCada vez que resistís este impulso, le devolvés poder a vos mismo. ¿Qué fue lo que detonó las ganas de escribirle hoy?`][msgCount%2];
  if(/no puedo|no aguant|cansad|agotad|harto/i.test(t))return `${n}, decir "no puedo más" toma coraje.\n\nEso que sentís tiene nombre: es el peso de cargar con una pérdida que todavía no terminó de procesarse. Es agotador. Tiene todo el sentido.\n\nAhora mismo, ¿podés hacer algo por mí? Nombrá en voz baja 5 cosas que ves a tu alrededor, 4 que podés tocar, 3 sonidos que escuchás. Es un ejercicio simple que baja la intensidad del momento.\n\nEstoy acá. No te apures.`;
  if(/extrañ|echo de menos|recuerd|pienso en/i.test(t))return `${n}, extrañar es una de las formas más honestas de haber amado.\n\nLo que perdiste no fue solo una persona. Fue un mundo compartido, una forma de verte reflejado en alguien. Ese dolor es proporcional a lo que fue real.\n\nEl duelo no es olvidar. Es aprender a vivir con la marca que dejó ese amor.\n\nProbá la respiración 4-7-8: inhalá 4 segundos, retené 7, exhalá 8. Hacelo dos veces. ¿Cómo estás después?`;
  if(/enoj|bronc|rabia|odio|furioso/i.test(t))return `${n}, la rabia también es parte del duelo. Y tiene sentido.\n\nA veces el enojo es más fácil de sostener que la tristeza — porque en la tristeza estás vulnerable, y en la rabia sentís que tenés algo de control.\n\nPero mandarle un mensaje desde ese lugar casi siempre termina mal. No porque no tengas razón — sino porque no te va a dar el cierre que necesitás.\n\nContame más. ¿Qué fue lo que pasó?`;
  if(/volver|quiere|quizás|tal vez|se arrepient/i.test(t))return `${n}, esa esperanza de que vuelva es una de las partes más difíciles del duelo.\n\nTu mente construye escenarios, busca señales. Es completamente normal. Pero tomar decisiones desde esa esperanza, en este momento de dolor, casi nunca sale bien.\n\n¿Qué te hace pensar que hay una chance?`;
  if(/mejor|bien|calm|gracias|ayud/i.test(t))return[`Me alegra mucho escuchar eso, ${n}.\n\nEse "mejor" que sentís ahora sos vos. No fue él/ella. Fuiste vos eligiendo no mandar ese mensaje, respirando, dándote un minuto.\n\nGuardá esa sensación. La próxima vez que el impulso aparezca, ya sabés que pasa.\n\n¿Hay algo más que quieras contarme?`,`${n}, que estés bien importa.\n\nEl duelo no es una línea recta — tiene momentos de calma y momentos de mucho dolor. Los dos son parte del proceso.\n\nCuando vuelva a aparecer ese impulso, acordate de volver acá.`][msgCount%2];
  return[`${n}, gracias por contarme.\n\nLo que estás atravesando tiene nombre y tiene sentido. El duelo por una ruptura no es solo tristeza — es la pérdida de un mundo compartido que no era de uno solo ni del otro. Eso duele de una forma muy particular.\n\nNo estás mal. Estás en proceso.\n\nProbá el ejercicio 5-4-3-2-1: nombrá 5 cosas que ves, 4 que podés tocar, 3 sonidos que escuchás, 2 olores, 1 sabor. ¿Cómo te sentís después?`,`${n}, te escucho.\n\nEl hecho de que todavía duela no significa que hiciste algo mal. Solo significa que amaste de verdad.\n\nEl camino no es olvidar ni dejar de sentir. Es aprender a vivir con lo que ese amor dejó en vos.\n\nInhalá profundo: 4 segundos, retené 7, exhalá 8. Dos veces. Estoy acá.`,`${n}, te acompaño.\n\nEse impulso de buscar contacto, de extrañar, de querer saber — es la parte más humana del duelo. No hay que avergonzarse de eso.\n\nPero lo que necesitás ahora no lo puede dar él/ella. Tiene que venir de adentro tuyo, y estás dando el primer paso al estar acá.\n\n¿Querés contarme un poco más?`][msgCount%3];
}

function send(){
  if(busy)return;
  const inp=document.getElementById('chat-in');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  addMsg('user',text);
  busy=true;
  document.getElementById('btn-send').disabled=true;
  showTyping();
  setTimeout(()=>{
    hideTyping();
    addMsg('ai',getReply(text));
    msgCount++;
    busy=false;
    document.getElementById('btn-send').disabled=false;
    inp.focus();
  },1400+Math.random()*800);
}

// Events
document.getElementById('btn-start').addEventListener('click',()=>{qIdx=0;answers={};show('s-ob');renderQ();});
document.getElementById('btn-back').addEventListener('click',()=>{show('s-intro');});
document.getElementById('btn-send').addEventListener('click',send);
document.getElementById('chat-in').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();send();}});
</script>
</body>
</html>
