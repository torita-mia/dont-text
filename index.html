<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Don't Text — Tu ancla emocional</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090f;
      --surface: #12121e;
      --surface2: #1a1a2e;
      --accent: #a78bfa;
      --accent-dim: #6d4fc7;
      --accent-glow: rgba(167,139,250,0.15);
      --text: #e2e0f0;
      --text-dim: #7c7a96;
      --bubble-ai: #16153a;
      --bubble-user: #2d1f5e;
      --border: rgba(167,139,250,0.12);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    .bg-orb { position: fixed; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(109,79,199,0.18) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 0; animation: orbPulse 6s ease-in-out infinite; }
    @keyframes orbPulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.7} 50%{transform:translate(-50%,-50%) scale(1.15);opacity:1} }
    .bg-stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s); opacity: 0; }
    @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.8)} 50%{opacity:var(--op,0.6);transform:scale(1.1)} }

    .screen { display: none; position: fixed; inset: 0; z-index: 10; }
    .screen.active { display: flex; }

    /* INTRO */
    #screen-intro { flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .intro-badge { display: inline-block; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--border); padding: 4px 14px; border-radius: 99px; margin-bottom: 1.5rem; background: var(--accent-glow); animation: fadeUp 0.7s ease both; }
    .intro-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem,10vw,5.5rem); font-weight: 400; line-height: 1.05; margin-bottom: 0.5rem; animation: fadeUp 0.7s ease 0.1s both; }
    .intro-title em { font-style: italic; color: var(--accent); }
    .intro-sub { font-size: 1rem; color: var(--text-dim); font-weight: 300; max-width: 340px; line-height: 1.7; margin-bottom: 2.5rem; animation: fadeUp 0.7s ease 0.2s both; }
    .btn-main { display: inline-flex; align-items: center; gap: 0.75rem; background: linear-gradient(135deg,#7c3aed,#a78bfa); color: white; border: none; padding: 1.1rem 2.5rem; border-radius: 99px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; box-shadow: 0 0 40px rgba(124,58,237,0.4); transition: transform 0.2s, box-shadow 0.2s; animation: fadeUp 0.7s ease 0.3s both; }
    .btn-main:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 0 60px rgba(124,58,237,0.6); }
    .intro-footer { position: absolute; bottom: 2rem; font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.05em; animation: fadeUp 0.7s ease 0.5s both; }

    /* ONBOARDING */
    #screen-onboarding { flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .ob-wrap { width: 100%; max-width: 480px; }
    .ob-progress { display: flex; gap: 6px; margin-bottom: 2rem; }
    .ob-dot { flex: 1; height: 3px; border-radius: 99px; background: var(--border); transition: background 0.3s; }
    .ob-dot.done { background: var(--accent); }
    .ob-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    .ob-question { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--text); line-height: 1.3; margin-bottom: 0.5rem; }
    .ob-sub { font-size: 0.85rem; color: var(--text-dim); line-height: 1.65; margin-bottom: 1.5rem; }
    .ob-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
    .ob-option { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; }
    .ob-option:hover, .ob-option.selected { border-color: rgba(167,139,250,0.5); background: rgba(167,139,250,0.08); }
    .ob-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.2s; }
    .ob-input:focus { border-color: rgba(167,139,250,0.4); }
    .ob-input::placeholder { color: var(--text-dim); }
    .btn-next { background: linear-gradient(135deg,#7c3aed,#a78bfa); color: white; border: none; padding: 11px 28px; border-radius: 99px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; margin-top: 0.75rem; transition: opacity 0.2s; }
    .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-next:not(:disabled):hover { opacity: 0.85; }

    /* CHAT */
    #screen-chat { flex-direction: column; }
    .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); background: rgba(9,9,15,0.85); backdrop-filter: blur(20px); flex-shrink: 0; }
    .chat-header-left { display: flex; align-items: center; gap: 10px; }
    .ch-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#4c1d95,#7c3aed); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; box-shadow: 0 0 15px rgba(124,58,237,0.4); }
    .ch-name { font-family: 'Playfair Display', serif; font-size: 1rem; }
    .ch-status { font-size: 0.7rem; color: var(--accent); display: flex; align-items: center; gap: 5px; }
    .ch-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
    .btn-back { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 5px 14px; border-radius: 99px; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }

    .chat-msgs { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .chat-msgs::-webkit-scrollbar { width: 3px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg { display: flex; gap: 8px; max-width: 86%; animation: msgIn 0.35s ease both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai { align-self: flex-start; }
    .msg-av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; margin-top: 2px; }
    .msg.ai .msg-av { background: linear-gradient(135deg,#4c1d95,#7c3aed); box-shadow: 0 0 10px rgba(124,58,237,0.3); }
    .msg.user .msg-av { background: var(--surface2); border: 1px solid var(--border); }
    .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.875rem; line-height: 1.65; white-space: pre-wrap; font-weight: 300; }
    .msg.ai .msg-bubble { background: var(--bubble-ai); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--bubble-user); border: 1px solid rgba(167,139,250,0.2); border-bottom-right-radius: 4px; }

    .typing { display: flex; gap: 8px; align-self: flex-start; animation: msgIn 0.3s ease both; }
    .typing-dots { background: var(--bubble-ai); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; padding: 12px 14px; display: flex; gap: 5px; align-items: center; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-dim); animation: dotBounce 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2){animation-delay:0.2s} .typing-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes dotBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-4px);opacity:1} }

    .chat-input-area { padding: 0.75rem 1.5rem 1.25rem; border-top: 1px solid var(--border); background: rgba(9,9,15,0.85); backdrop-filter: blur(20px); flex-shrink: 0; }
    .input-wrap { display: flex; gap: 8px; align-items: flex-end; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 0.5rem 0.5rem 0.5rem 1rem; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: rgba(167,139,250,0.35); }
    #chat-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 300; resize: none; max-height: 110px; line-height: 1.5; padding: 0.3rem 0; }
    #chat-input::placeholder { color: var(--text-dim); }
    .btn-send { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#7c3aed,#a78bfa); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 0 15px rgba(124,58,237,0.3); }
    .btn-send:hover { transform: scale(1.08); }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-send svg { width: 14px; height: 14px; fill: white; }
    .input-hint { font-size: 0.68rem; color: var(--text-dim); text-align: center; margin-top: 0.5rem; letter-spacing: 0.02em; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @media(max-width:480px) { .chat-msgs{padding:1rem} .chat-input-area{padding:0.75rem 1rem 1rem} .msg{max-width:92%} }
  </style>
</head>
<body>
<div class="bg-orb"></div>
<div class="bg-stars" id="stars"></div>

<!-- INTRO -->
<div id="screen-intro" class="screen active">
  <span class="intro-badge">✦ tu ancla emocional</span>
  <h1 class="intro-title">Don't<br><em>Text.</em></h1>
  <p class="intro-sub">Estás a punto de escribirle. Respirá. Estoy acá para ayudarte a no hacerlo.</p>
  <button class="btn-main" onclick="goTo('onboarding')">
    <span>💬</span> Necesito ayuda ahora
  </button>
  <p class="intro-footer">Sin registro · Confidencial · Siempre disponible</p>
</div>

<!-- ONBOARDING -->
<div id="screen-onboarding" class="screen">
  <div class="ob-wrap">
    <div class="ob-progress">
      <div class="ob-dot" id="ob-p0"></div>
      <div class="ob-dot" id="ob-p1"></div>
      <div class="ob-dot" id="ob-p2"></div>
    </div>
    <div id="ob-content"></div>
  </div>
</div>

<!-- CHAT -->
<div id="screen-chat" class="screen">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="ch-avatar">✦</div>
      <div>
        <div class="ch-name">Don't Text</div>
        <div class="ch-status"><span class="ch-dot"></span>acá para vos</div>
      </div>
    </div>
    <button class="btn-back" onclick="goTo('intro')">← volver</button>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-input-area">
    <div class="input-wrap">
      <textarea id="chat-input" rows="1" placeholder="Contame qué está pasando..."></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter para enviar · Shift+Enter para nueva línea</p>
  </div>
</div>

<script>
// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*4+2}s;--delay:${Math.random()*5}s;--op:${Math.random()*0.5+0.2}`;
  starsEl.appendChild(s);
}

// ── State ──
let userName = '', timeSince = '', situation = '';
let currentQ = 0, answers = {}, busy = false, msgCount = 0;

// ── Navigation ──
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  if (screen === 'intro') { document.getElementById('chat-msgs').innerHTML = ''; msgCount = 0; }
}

// ── Onboarding ──
const questions = [
  { id: 'name', label: 'Primero lo primero', q: '¿Cómo te llamás?', sub: 'Solo tu nombre, para poder hablarte de cerca.', type: 'input', placeholder: 'Tu nombre...' },
  { id: 'time', label: 'Contame un poco', q: '¿Cuánto tiempo pasó desde la ruptura?', sub: 'No hay respuesta correcta. Solo quiero entenderte mejor.', type: 'options', options: ['Menos de una semana', 'Unas semanas', 'Uno o dos meses', 'Más de dos meses'] },
  { id: 'situation', label: 'Ahora mismo', q: '¿Qué está pasando en este momento?', sub: 'Elegí lo que más se acerque a lo que sentís ahora.', type: 'options', options: ['Estoy a punto de escribirle', 'No puedo dejar de pensar en él/ella', 'Siento que no puedo más', 'Necesito hablar con alguien'] }
];

function renderQ() {
  const q = questions[currentQ];
  [0,1,2].forEach(i => document.getElementById('ob-p'+i).classList.toggle('done', i <= currentQ));
  let html = `<div class="ob-label">${q.label}</div><div class="ob-question">${q.q}</div><div class="ob-sub">${q.sub}</div>`;
  if (q.type === 'input') {
    html += `<input class="ob-input" id="ob-input" type="text" placeholder="${q.placeholder}" maxlength="30" /><br><button class="btn-next" id="ob-next" onclick="nextQ()" disabled>Continuar →</button>`;
  } else {
    html += `<div class="ob-options">` + q.options.map((o,i) => `<button class="ob-option" onclick="selectOpt(${i},'${o.replace(/'/g,"\\'")}')">` + o + `</button>`).join('') + `</div>`;
  }
  document.getElementById('ob-content').innerHTML = html;
  if (q.type === 'input') {
    const inp = document.getElementById('ob-input');
    inp.addEventListener('input', () => { document.getElementById('ob-next').disabled = inp.value.trim().length < 2; });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && inp.value.trim().length >= 2) nextQ(); });
    setTimeout(() => inp.focus(), 50);
  }
}

function selectOpt(i, val) {
  document.querySelectorAll('.ob-option').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.ob-option')[i].classList.add('selected');
  answers[questions[currentQ].id] = val;
  setTimeout(nextQ, 280);
}

function nextQ() {
  const q = questions[currentQ];
  if (q.type === 'input') {
    const v = document.getElementById('ob-input').value.trim();
    if (v.length < 2) return;
    answers[q.id] = v;
  }
  if (!answers[q.id]) return;
  currentQ++;
  if (currentQ >= questions.length) {
    userName = answers.name;
    timeSince = answers.time;
    situation = answers.situation;
    startChat();
  } else renderQ();
}

// ── Chat start ──
function startChat() {
  goTo('chat');
  document.getElementById('chat-msgs').innerHTML = '';
  msgCount = 0;
  const greetings = {
    'Menos de una semana': `${userName}, es muy reciente. El dolor está en su punto más crudo ahora mismo, y tiene todo el sentido que estés así.`,
    'Unas semanas': `${userName}, ya pasaron unas semanas. Aunque parezca que debería estar mejorando, el duelo no tiene horarios.`,
    'Uno o dos meses': `${userName}, ya pasó un tiempo, pero estas cosas no se resuelven en línea recta. Que estés acá hoy no significa que retrocediste.`,
    'Más de dos meses': `${userName}, llevas un buen tiempo cargando con esto. Y que todavía duela no significa que hiciste algo mal.`
  };
  const sitLines = {
    'Estoy a punto de escribirle': 'Que hayas entrado acá antes de hacerlo ya dice mucho de vos.',
    'No puedo dejar de pensar en él/ella': 'Esa presencia constante en tu cabeza tiene sentido. Es parte del proceso.',
    'Siento que no puedo más': 'Escucharte decir eso me importa. Estoy acá, no te apures.',
    'Necesito hablar con alguien': 'Bien que hayas venido. Contame todo lo que necesités.'
  };
  const g = greetings[timeSince] || `Hola, ${userName}. Estoy acá.`;
  const s = sitLines[situation] || 'Contame qué está pasando.';
  setTimeout(() => addMsg('ai', `${g}\n\n${s}\n\n¿Qué está pasando ahora mismo?`), 500);
}

// ── AI Responses (Rolón framework) ──
function getResponse(text) {
  const t = text.toLowerCase();
  const n = userName;

  // Querer escribir / llamar
  if (/escribi|llam|manda|texto|whatsapp|mensaje/i.test(t)) {
    return [
      `${n}, ese impulso que sentís ahora no es amor. Es ansiedad.\n\nLo que extrañás no es solo a él/ella — es ese espacio único que construyeron juntos, ese territorio que existía entre los dos y que ya no está. Tu mente lo busca porque todavía duele.\n\nPero escribirle desde este lugar no va a devolverte ese espacio. Solo te va a dejar más expuesto.\n\nAntes de hacerlo, probá esto: inhalá contando hasta 4... retené el aire 7 segundos... y exhalá muy despacio en 8. Dos veces. El impulso baja. ¿Podés intentarlo?`,
      `${n}, entiendo. Ese deseo de contacto es completamente humano.\n\nHay algo importante que quiero que sepas: solo duele lo que realmente importó. Lo que sentís ahora es la prueba de que ese amor fue real. No lo minimices.\n\nPero enviar ese mensaje ahora, desde este dolor, no te va a dar lo que necesitás. Probablemente te deje más vulnerable después.\n\nCada vez que resistís este impulso, le devolvés poder a vos mismo. ¿Me contás qué fue lo que detonó las ganas de escribirle hoy?`
    ][msgCount % 2];
  }

  // No poder más / agotamiento
  if (/no puedo|no aguant|cansad|agotad|harto|hart[ao]/i.test(t)) {
    return `${n}, decir "no puedo más" toma coraje. Escucharte así me importa.\n\nEso que sentís tiene nombre: es el peso de cargar con una pérdida que todavía no terminó de procesarse. Y es agotador. Tiene todo el sentido que estés así.\n\nAhora mismo, ¿podés hacer algo por mí? Nombrá en voz baja 5 cosas que ves a tu alrededor, 4 que podés tocar, 3 sonidos que escuchás. Es un ejercicio simple que baja la intensidad del momento.\n\nEstoy acá. No te apures.`;
  }

  // Extrañar
  if (/extrañ|echo de menos|recuerd|pienso en|no lo|no la/i.test(t)) {
    return `${n}, extrañar es una de las formas más honestas de haber amado.\n\nLo que perdiste no fue solo una persona. Fue un mundo compartido, una forma de verte reflejado en alguien. Ese dolor es proporcional a lo que fue real.\n\nEl duelo no es olvidar. Es aprender a vivir con la marca que dejó ese amor. Y eso lleva tiempo — más del que queremos.\n\nProbá la respiración 4-7-8: inhalá 4 segundos, retené 7, exhalá 8. Hacelo dos veces. ¿Cómo estás después?`;
  }

  // Enojo / rabia
  if (/enoj|bronc|rabia|odio|furioso|me hizo|me trató/i.test(t)) {
    return `${n}, la rabia también es parte del duelo. Y tiene sentido.\n\nA veces el enojo es más fácil de sostener que la tristeza — porque en la tristeza estás vulnerable, y en la rabia sentís que tenés algo de control.\n\nPero mandarle un mensaje desde ese lugar casi siempre termina mal. No porque no tengas razón en lo que sentís — sino porque no te va a dar el cierre que necesitás.\n\nContame más. ¿Qué fue lo que pasó?`;
  }

  // Esperanza de volver
  if (/volver|quiere|quizás|tal vez|se arrepient|me llam/i.test(t)) {
    return `${n}, esa esperanza de que vuelva es una de las partes más difíciles del duelo.\n\nHay algo que Rolón llama "el fantasma del amado" — esa presencia que sigue ahí aunque ya no esté. Tu mente construye escenarios, busca señales. Es completamente normal.\n\nPero tomar decisiones desde esa esperanza, en este momento de dolor, casi nunca sale bien. No porque no pueda pasar — sino porque ahora mismo no estás en condiciones de evaluar si sería bueno para vos.\n\n¿Qué te hace pensar que hay una chance de que vuelva?`;
  }

  // Mejor / mejoría
  if (/mejor|bien|calm|grac|ayud/i.test(t)) {
    const closings = [
      `Me alegra mucho escuchar eso, ${n}.\n\nEse "mejor" que sentís ahora sos vos. No fue él/ella. Fuiste vos eligiendo no mandar ese mensaje, respirando, dándote un minuto.\n\nGuardá esa sensación. La próxima vez que el impulso aparezca, ya sabés que pasa. Ya lo viviste.\n\n¿Hay algo más que quieras contarme?`,
      `${n}, que estés bien importa.\n\nEl duelo no es una línea recta — tiene momentos así, de calma, y momentos de mucho dolor. Los dos son parte del proceso.\n\nCuando vuelva a aparecer ese impulso, acordate de volver acá. Estoy disponible cuando me necesités.`
    ];
    return closings[msgCount % 2];
  }

  // Respuestas generales según el contexto del onboarding
  const generalResponses = [
    `${n}, gracias por contarme.\n\nLo que estás atravesando tiene nombre y tiene sentido. El duelo por una ruptura no es solo tristeza — es la pérdida de un mundo compartido que no era de uno solo ni del otro, sino de los dos juntos. Y eso duele de una forma muy particular.\n\nNo estás mal. Estás en proceso.\n\nProbá el ejercicio 5-4-3-2-1: nombrá 5 cosas que ves, 4 que podés tocar, 3 sonidos que escuchás, 2 olores, 1 sabor. Te ayuda a bajar la intensidad del momento. ¿Cómo te sentís ahora?`,
    `${n}, te escucho.\n\nHay algo importante que quiero que sepas: el hecho de que todavía duela no significa que hiciste algo mal. Solo significa que amaste de verdad. Solo duele lo que importó.\n\nEl camino no es olvidar ni dejar de sentir. Es aprender a vivir con lo que ese amor dejó en vos.\n\nInhalá profundo: 4 segundos, retené 7, exhalá 8. Dos veces. Estoy acá.`,
    `${n}, te acompaño.\n\nEse impulso que sentís — de buscar contacto, de querer saber, de extrañar — es la parte más humana del duelo. No hay que avergonzarse de eso.\n\nPero lo que necesitás ahora no lo puede dar él/ella. Tiene que venir de adentro tuyo, y estás dando el primer paso al estar acá.\n\n¿Querés contarme un poco más sobre qué está pasando?`
  ];

  return generalResponses[msgCount % generalResponses.length];
}

// ── Chat mechanics ──
function addMsg(role, text) {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = role === 'ai' ? '✦' : (userName ? userName[0].toUpperCase() : '?');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.style.whiteSpace = 'pre-wrap';
  bubble.textContent = text;
  div.appendChild(av);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-el';
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.style.cssText = 'background:linear-gradient(135deg,#4c1d95,#7c3aed);box-shadow:0 0 10px rgba(124,58,237,0.3);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0;';
  av.textContent = '✦';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(av);
  div.appendChild(dots);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-el');
  if (el) el.remove();
}

function sendMessage() {
  if (busy) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  busy = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  const delay = 1400 + Math.random() * 800;
  setTimeout(() => {
    hideTyping();
    const reply = getResponse(text);
    addMsg('ai', reply);
    msgCount++;
    busy = false;
    document.getElementById('send-btn').disabled = false;
  }, delay);
}

const textarea = document.getElementById('chat-input');
textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});
textarea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Init onboarding
document.addEventListener('DOMContentLoaded', () => {
  currentQ = 0; answers = {};
  document.getElementById('ob-content') && renderQ();
});
document.getElementById('screen-onboarding').addEventListener('transitionend', () => {
  if (document.getElementById('screen-onboarding').classList.contains('active')) {
    currentQ = 0; answers = {}; renderQ();
  }
});

// Patch goTo to init onboarding
const _goTo = goTo;
window.goTo = function(screen) {
  _goTo(screen);
  if (screen === 'onboarding') { currentQ = 0; answers = {}; renderQ(); }
};
</script>
